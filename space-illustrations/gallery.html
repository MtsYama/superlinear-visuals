<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stay Superlinear · Space Group 矢量插图</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#F4F3F1;color:#1B1D21;
 font-family:"Segoe UI",Manrope,system-ui,-apple-system,sans-serif;padding:48px;transition:background .25s}
h1{font-size:26px;font-weight:700;margin:0 0 6px}
.sub{color:#585C63;font-size:16px;margin:0 0 14px}
.btns{display:flex;gap:10px;margin:0 0 14px;flex-wrap:wrap}
.btns button{font:600 14.5px/1 "Segoe UI",sans-serif;padding:9px 16px;border-radius:999px;
 border:1.5px solid rgba(0,0,0,.25);background:#fff;color:#1B1D21;cursor:pointer}
.btns button.on{background:#1B1D21;color:#fff;border-color:#1B1D21}
.pal{display:flex;gap:8px;margin:0 0 26px}
.pal span{width:34px;height:34px;border-radius:8px;border:1px solid rgba(0,0,0,.12)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:26px}
figure{margin:0;background:#fff;border:1px solid rgba(0,0,0,.10);border-radius:18px;
 overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.art{position:relative}
.art img{display:block;width:100%;height:auto}
.crop-guide{position:absolute;inset:0;display:none;pointer-events:none}
.crop-guide svg{width:100%;height:100%}
.crop-guide rect{fill:none;stroke-width:1.4;vector-effect:non-scaling-stroke;stroke-dasharray:5 5}
.crop-guide .g43{stroke:#D8564B}
.crop-guide .g34{stroke:#2F6FB0}
body.guides .crop-guide{display:block}
.tog{display:inline-flex;align-items:center;gap:8px;font-size:15px;color:#585C63;
 margin:0 0 22px;cursor:pointer;user-select:none}
.tog i{font-style:normal;color:#D8564B} .tog b{font-weight:600;color:#2F6FB0}
figcaption{display:flex;align-items:center;gap:9px;padding:13px 16px;border-top:1px solid rgba(0,0,0,.08)}
figcaption b{font-size:16px}
figcaption small{color:#585C63;font-size:13px;margin-left:auto}
.dot{width:11px;height:11px;border-radius:50%;flex:none}
</style></head><body>
<h1>Stay Superlinear · Space Group 矢量插图</h1>
<p class="sub" id="sub"></p>
<div class="btns" id="btns"><button data-key="mono">✅ mono · 正式</button><button data-key="seven">seven · 备份</button><button data-key="vivid">vivid · 对照</button><button data-key="v1">v1 · 旧版</button></div>
<div class="pal" id="pal"></div>
<label class="tog"><input type="checkbox" id="tg"> 显示裁切安全线（<i>红 4:3</i> / <b>蓝 3:4</b> 中心裁切 · 关键元素应落在两框交叠的中心区内）</label>
<div class="grid"><figure><div class="art"><img class="tile" data-slug="townhall" src="out/townhall.svg" alt="市政厅"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="townhall"></span><b>市政厅</b><small>免费区 · townhall</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="plaza" src="out/plaza.svg" alt="广场"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="plaza"></span><b>广场</b><small>免费区 · plaza</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="club" src="out/club.svg" alt="俱乐部"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="club"></span><b>俱乐部</b><small>Stay Superlinear · club</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="venue" src="out/venue.svg" alt="会场"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="venue"></span><b>会场</b><small>Stay Superlinear · venue</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="studio" src="out/studio.svg" alt="工作室"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="studio"></span><b>工作室</b><small>Stay Superlinear · studio</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="courses" src="out/courses.svg" alt="课程"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="courses"></span><b>课程</b><small>Academy · courses</small></figcaption></figure>
<figure><div class="art"><img class="tile" data-slug="field" src="out/field.svg" alt="实验田"><div class="crop-guide"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="0" y="12.5" width="100" height="75" class="g43"/><rect x="12.5" y="0" width="75" height="100" class="g34"/></svg></div></div><figcaption><span class="dot" data-slug="field"></span><b>实验田</b><small>Superlinear · field</small></figcaption></figure>
</div>
<script>
const PALS = {"mono": {"btn": "✅ mono · 正式", "dir": "out-mono", "sub": "浅灰底 #F4F3F1（同 v1·中性暖灰）· 官方墨 #1E1E1E · 官方蓝降饱和 #7E97BD 点睛 · ✅ mono=正式(终选 2026-07-15)", "ground": "#F4F3F1", "accents": {"townhall": "#7E97BD", "plaza": "#7E97BD", "club": "#7E97BD", "venue": "#7E97BD", "studio": "#7E97BD", "courses": "#7E97BD", "field": "#7E97BD"}}, "seven": {"btn": "seven · 备份", "dir": "out-seven", "sub": "浅灰底 #F4F3F1（同 v1·中性暖灰）· 官方墨 #1E1E1E · 七色降饱和 dusty · seven=备份", "ground": "#F4F3F1", "accents": {"townhall": "#6E8CAE", "plaza": "#6D9E96", "club": "#9284AE", "venue": "#C0A36E", "studio": "#C08A6B", "courses": "#7A85A8", "field": "#99A566"}}, "vivid": {"btn": "vivid · 对照", "dir": "out-vivid", "sub": "官方米底 #EEEBE0（Icon_Azure_HaveBgd 同款）· 官方墨 #1E1E1E · 官方蓝原样 #0E6EF4 · vivid=对照存档", "ground": "#EEEBE0", "accents": {"townhall": "#0E6EF4", "plaza": "#0E6EF4", "club": "#0E6EF4", "venue": "#0E6EF4", "studio": "#0E6EF4", "courses": "#0E6EF4", "field": "#0E6EF4"}}, "v1": {"btn": "v1 · 旧版", "dir": "out", "sub": "7 组 · 1:1 · SVG（可改可缩放）· 同族配色 + 统一点纹 · 浅底极简", "ground": "#F4F3F1", "accents": {"townhall": "#3E6FB0", "plaza": "#2E9C8D", "club": "#7A5AA6", "venue": "#BE8C2C", "studio": "#BE6438", "courses": "#3A4C86", "field": "#79982F"}}};
function setPal(k){
  const p = PALS[k]; if(!p) return;
  document.querySelectorAll('img.tile').forEach(im => { im.src = p.dir + '/' + im.dataset.slug + '.svg'; });
  document.querySelectorAll('.dot').forEach(d => { d.style.background = p.accents[d.dataset.slug]; });
  document.getElementById('sub').textContent = p.sub;
  document.getElementById('pal').innerHTML = Object.entries(p.accents)
    .map(([s,a]) => '<span title="'+s+' '+a+'" style="background:'+a+'"></span>').join('');
  document.body.style.background = p.ground;
  document.querySelectorAll('#btns button').forEach(b => b.classList.toggle('on', b.dataset.key===k));
  try { history.replaceState(null,'','#'+k); } catch(e) {}
}
document.querySelectorAll('#btns button').forEach(b => b.onclick = () => setPal(b.dataset.key));
document.getElementById('tg').onchange = e => document.body.classList.toggle('guides', e.target.checked);
const init = location.hash.slice(1);
setPal(PALS[init] ? init : (PALS['mono'] ? 'mono' : 'v1'));
</script>
</body></html>
